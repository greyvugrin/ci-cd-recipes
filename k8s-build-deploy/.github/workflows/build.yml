name: Build Workflow

on:
  workflow_call:
    inputs:
      LATEST_TAG:
        required: true
        type: string
      REGISTRY_NAME:
        required: true
        type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  build-images:
    name: ${{ matrix.build.name }}
    strategy:
      matrix:
        # Note: You could easily update this to build to a different target if using multi-stage Dockerfiles, or to build/push different images by updating the `build` matrix.
        build: [
          {
            name: "App",
            dockerfile: "app.Dockerfile",
            cache_scope: "app",
            tag: "app"
          },
          {
            name: "Static",
            dockerfile: "static.Dockerfile",
            cache_scope: "static",
            tag: "static"
          }
        ]

    runs-on: ubuntu-latest

    steps:
      - name: Tune GitHub-hosted runner network
        uses: smorimoto/tune-github-hosted-runner-network@v1

      - name: "Action: Checkout Codebase"
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Login to Azure Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Using the `docker/build-push-action` action, build and push the image to the Azure Container Registry
      - name: "Build And Push ${{ matrix.build.name }} Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.build.dockerfile }}
          cache-from: type=gha,scope=${{ matrix.build.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.build.cache_scope }}
          # Note: We don't need to load because we are not using the docker images in subsequent steps
          # This saves time by not creating another output
          load: false
          push: true
          tags: |
            ${{ inputs.REGISTRY_NAME }}/${{ matrix.build.tag }}:${{ github.sha }}
            ${{ inputs.REGISTRY_NAME }}/${{ matrix.build.tag }}:${{ inputs.LATEST_TAG }}