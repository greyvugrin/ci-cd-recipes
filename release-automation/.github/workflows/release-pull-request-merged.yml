name: Release Pull Request Merged

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  release-metadata:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    name: "Fetch Release Metadata"
    uses: ./.github/workflows/release-metadata.yml
    secrets: inherit

  handle-release:
    runs-on: ubuntu-latest
    needs: release-metadata

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release info
        id: extract_release_info
        run: |
          echo "branch_name=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV
          release_number=$(echo "${{ github.event.pull_request.head.ref }}" | sed -n 's/release\/\([0-9]*\.[0-9]*\.[0-9]*\)/\1/p')
          echo "release_number=$release_number" >> $GITHUB_ENV
          echo "Release number extracted: $release_number"
          release_url="https://github.com/${{ github.repository }}/releases/tag/$release_number"
          echo "Release URL: $release_url"
          echo "release_url=$release_url" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_number" -m "Release $release_number"
          git push origin "$release_number"

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_number }}
          name: ${{ env.release_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on pull request
        run: |
          pr_number="${{ github.event.pull_request.number }}"
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -X POST \
            -d "{\"body\": \"A new release has been created: [Release ${{ env.release_number }}](${{ env.release_url }})\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$pr_number/comments"

      - name: Create slack message with link to the release
        uses: slackapi/slack-github-action@v2.1.1
        id: slack-message
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.RELEASES_SLACK_CHANNEL_ID }}
            thread_ts: "${{ needs.release-metadata.outputs.slack_thread_ts }}"
            text: "🗒️ Release has been created: <${{ env.release_url }}|${{ env.release_number }}>"

  pre-production-slack-message:
    name: "Slack Message - Pre-Production Environment Turned Off"
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - handle-release
    steps:
      - name: Send Slack message
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.RELEASES_SLACK_CHANNEL_ID }}
            thread_ts: "${{ needs.release-metadata.outputs.slack_thread_ts }}"
            text: "🧹 Release completed. Consider scaling down a stage/pre-production environment if appropriate."

      - name: Note about pre-production scaling
        run: |
          echo "Note: scaling down a stage/pre-production environment may be helpful here."
