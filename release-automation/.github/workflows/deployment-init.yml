name: Initialize Deployment

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "Select the environment to deploy to"
        required: true
        type: string
      GIT_REF:
        description: "Enter the branch to deploy (e.g., release/*)"
        required: true
        type: string
      FORCE_DEPLOYMENT:
        description: "Force deployment: deploy all services regardless of files changed since the last deployment."
        required: true
        type: string # This becomes a string when passed in from the build-and-deploy workflow
      SLACK_THREAD_TS:
        description: "Slack thread timestamp for notifications"
        required: false
        type: string
    secrets:
      SLACK_TOKEN:
        description: "Slack token for notifications"
        required: false
      SLACK_CHANNEL_ID:
        description: "Slack channel ID for notifications"
        required: false
    outputs:
      deployment_id:
        description: "Deployment ID"
        value: ${{ jobs.init.outputs.deployment_id }}
      skip_deployment:
        description: "Whether to skip the deployment"
        value: ${{ jobs.check-files.outputs.skip_deployment }}
      changed_files:
        description: "List of changed files"
        value: ${{ jobs.check-files.outputs.changed_files }}
      changed_files_json:
        description: "List of changed files"
        value: ${{ jobs.check-files.outputs.changed_files_json || '[]' }}  # Default to empty array if not set (needed for when a forced deployment is triggered)

jobs:
  check-files:
    name: "Check Changed Files"
    runs-on: ubuntu-latest
    if: ${{ inputs.FORCE_DEPLOYMENT == 'false' }}
    outputs:
      skip_deployment: ${{ steps.check_commits.outputs.skip_deployment || steps.set_changed_files.outputs.skip_deployment }}
      changed_files: ${{ steps.set_changed_files.outputs.changed_files }}
      changed_files_json: ${{ steps.set_changed_files.outputs.changed_files_json }}
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4.0.0
        with:
          # We do not want to use the GIT_REF here because we want to use the current branch's code to be used for the action
          # We could be running this workflow on a different branch than the one we are building
          fetch-depth: 1

      # Get the last deployment to this env's commit hash
      # Reference: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-github-cli
      # https://docs.github.com/en/graphql/guides/forming-calls-with-graphql
      - name: "Get Last Successful Deployment Commit"
        id: last_deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          graphql_query='
          query($owner: String!, $repo: String!) {
            repositoryOwner(login: $owner) {
              repository(name: $repo) {
                deployments(first:100, environments:["${{ inputs.ENVIRONMENT }}"], orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    id
                    state
                    environment
                    commit {
                      oid
                    }
                  }
                }
              }
            }
          }
          '

          # Use the GitHub CLI to get the last deployment commit
          last_commit=$(gh api graphql -f owner='${{ github.repository_owner }}' -f repo='${{ github.event.repository.name }}' -f query="$graphql_query" \
            --jq '.data.repositoryOwner.repository.deployments.nodes[] | select(.state == "ACTIVE") | .commit.oid' | head -n 1)

          # If last_commit is empty something went wrong
          if [[ -z "$last_commit" ]]; then
            echo "🔴 No last deployment found for environment ${{ inputs.ENVIRONMENT }}."
            exit 1
          fi

          echo "last_commit=$last_commit" >> $GITHUB_OUTPUT
          echo "Last successful deployment commit: $last_commit"

      - name: "Fetch Commit/Git Ref"
        run: |
          echo "Fetching last deployment commit: ${{ steps.last_deployment.outputs.last_commit }}"
          git fetch origin --depth=1 ${{ steps.last_deployment.outputs.last_commit }}
          echo "Fetching desired git ref: ${{ inputs.GIT_REF }}"
          git fetch origin --depth=1 ${{ inputs.GIT_REF }}

      - name: "Check that commits are different"
        id: check_commits
        run: |
          last_commit="${{ steps.last_deployment.outputs.last_commit }}"
          git_ref="${{ inputs.GIT_REF }}"
          if [ "$(git ls-remote --heads origin "$git_ref" | wc -l)" -ge 1 ]; then
            # We have a branch, so we need to get the commit SHA for it
            # Get the commit SHA for the git ref from the remote
            ref_commit=$(git ls-remote origin "$git_ref" | awk '{print $1}')
          else
            ref_commit="$git_ref"
          fi

          echo "last_commit=$last_commit"
          echo "ref_commit=$ref_commit"

          # Add a notice with a link to the diff in github
          echo "::notice::Changes between the last deployment and the target git ref: https://github.com/${{ github.repository }}/compare/$last_commit...$ref_commit"

          # Do a git diff to check if there are any changes
          CHANGES=false; (git diff -s --exit-code "$last_commit" "$ref_commit") || CHANGES=true
          if [[ $CHANGES == false ]]; then
            # Add this as a notice via workflow commands and exit
            echo "::notice::No changes detected between $last_commit and $git_ref. This was probably already deployed. Skipping deployment. You can force a deployment by setting the FORCE_DEPLOYMENT input to true."
            # Add to the output
            echo "skip_deployment=true" >> $GITHUB_OUTPUT
          fi

      # Note: If you rerun a job with debug logging enabled you can get a lot more information about the changed files
      - uses: tj-actions/changed-files@90a06d6ba9543371ab4df8eeca0be07ca6054959 # v42.0.2
        id: filter
        if: ${{ steps.check_commits.outputs.skip_deployment != 'true' }}
        with:
          base_sha: ${{ steps.last_deployment.outputs.last_commit }}
          sha: ${{ inputs.GIT_REF }}
          # Note: With the provided YAML file, you can only check changes based on the categories defined in it.
          # ex:
          # - `app` is a top-level category
          # - you can use `app_any_changed` to check if any files in the `app` category have changed
          # - `app_all_changed_files` will give you all the files that changed in the `app` category
          #
          # See the action above for other available outputs
          files_yaml_from_source_file: ./.github/file_types.yml

      # Create an array of the types of files that were changed
      - name: "Set Changed Files"
        id: set_changed_files
        if: ${{ steps.check_commits.outputs.skip_deployment != 'true' }}
        run: |
          changed_files=()
          if [[ "${{ steps.filter.outputs.redirects_any_changed }}" == "true" ]]; then
            changed_files+=("redirects")
          fi
          if [[ "${{ steps.filter.outputs.app_any_changed }}" == "true" ]]; then
            changed_files+=("app")
          fi
          if [[ "${{ steps.filter.outputs.varnish_any_changed }}" == "true" ]]; then
            changed_files+=("varnish")
          fi
          if [[ "${{ steps.filter.outputs.protected_media_any_changed }}" == "true" ]]; then
            changed_files+=("protected-media")
          fi
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "No relevant files changed, skipping deployment."
            echo "skip_deployment=true" >> $GITHUB_OUTPUT
            # Add this as a notice via workflow commands
            echo "::notice::No relevant files changed, skipping deployment. You can force a deployment by setting the FORCE_DEPLOYMENT input to true."
          else
            echo "skip_deployment=false" >> $GITHUB_OUTPUT
            echo "changed_files=${changed_files[*]}" >> $GITHUB_OUTPUT
            # Put changed files json into the output
            # From https://stackoverflow.com/a/67489301/2514961
            echo "changed_files_json=$(jq --compact-output --null-input '$ARGS.positional' --args -- "${changed_files[@]}")" >> $GITHUB_OUTPUT
            # Add the changed files to the Github summary via workflow commands
            # Ex: echo "{markdown content}" >> $GITHUB_STEP_SUMMARY
            echo 'Comparing the desired git reference (`${{ inputs.GIT_REF }}`) to the code in the last successful deployment to this environment.' >> $GITHUB_STEP_SUMMARY
            echo "## Changed File Categories" >> $GITHUB_STEP_SUMMARY
            for file_category in "${changed_files[@]}"; do
              echo "- $file_category" >> $GITHUB_STEP_SUMMARY
            done
            echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
            echo "> These file categories will be used to determine which images to build and deploy." >> $GITHUB_STEP_SUMMARY
          fi

      # echo out the changed files for debugging
      - name: "Debug Changed Files"
        run: |
          if [[ "${{ steps.set_changed_files.outputs.skip_deployment }}" == "true" ]]; then
            echo "No relevant files changed, skipping deployment."
          else
            echo "Changed files: ${{ steps.set_changed_files.outputs.changed_files }}"
            echo "Changed files array: ${changed_files[@]}"
          fi

  init:
    name: "Init"
    needs:
      - check-files
    runs-on: ubuntu-latest

    if: ${{ always() && (needs.check-files.outputs.skip_deployment != 'true' || inputs.FORCE_DEPLOYMENT == 'true') }}

    outputs:
      deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}

    steps:
      # If force was used, add a notice to the summary
      - name: "Add Force Deployment Notice"
        if: ${{ inputs.FORCE_DEPLOYMENT == 'true' }}
        run: |
          echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
          echo "> This deployment was forced." >> $GITHUB_STEP_SUMMARY
          echo "> - File change evaluation was skipped." >> $GITHUB_STEP_SUMMARY
          echo "> - All images will be built." >> $GITHUB_STEP_SUMMARY
          echo "> - All images will be deployed." >> $GITHUB_STEP_SUMMARY
      - name: "Create Deployment"
        id: create_deployment
        run: |
          is_production=$([[ "${{ inputs.ENVIRONMENT }}" == "prod" ]] && echo "true" || echo "false")
          is_transient=$([[ "${{ inputs.ENVIRONMENT }}" == "prod" || "${{ inputs.ENVIRONMENT }}" == "dev" ]] && echo "false" || echo "true")
          response=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/deployments \
            -d @- <<EOF
          {
            "ref": "${{ inputs.GIT_REF }}",
            "environment": "${{ inputs.ENVIRONMENT }}",
            "description": "Deploying ${{ inputs.GIT_REF }} to ${{ inputs.ENVIRONMENT }}",
            "auto_merge": false,
            "required_contexts": [],
            "task": "deploy",
            "log_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "transient_environment": $is_transient,
            "production_environment": $is_production
          }
          EOF
          )
          echo "$response" > response.json
          deployment_id=$(jq -r '.id' response.json)
          # Check that there is a deployment ID
          if [[ -z "$deployment_id" || "$deployment_id" == "null" ]]; then
            echo "🔴 Deployment creation failed!"
            cat response.json
            exit 1
          fi
          echo "deployment_id=$deployment_id" >> $GITHUB_OUTPUT

  slack-notification:
    name: "Slack Notification"
    runs-on: ubuntu-latest
    needs: init
    if: ${{ inputs.SLACK_THREAD_TS }}
    steps:
      - name: Create message with link to the run
        uses: slackapi/slack-github-action@v2.1.1
        id: slack-message
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            thread_ts: "${{ inputs.SLACK_THREAD_TS }}"
            text: "🟡 ${{ inputs.ENVIRONMENT }} deployment started. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View deployment run>"
